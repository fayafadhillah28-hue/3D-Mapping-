name: Deploy via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/
          protocol: ftps          # Coba ftps, atau ganti ke ftp jika tidak support
          port: 21
          security: strict        # Ganti ke "loose" jika SSL certificate error
          timeout: 60000          # 60 detik timeout
          log-level: verbose      # Untuk debug lebih detail
